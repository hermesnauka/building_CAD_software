services:
  mysql:
    image: mysql:8.0
    container_name: cad_edu_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:php8.2-apache
    container_name: cad_edu_wordpress
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      # Hardening: disable file editing from wp-admin, force SSL admin behind a
      # TLS-terminating proxy in production (see REQUIREMENTS.md security section).
      WORDPRESS_CONFIG_EXTRA: |
        define('DISALLOW_FILE_EDIT', true);
        define('FORCE_SSL_ADMIN', ${FORCE_SSL_ADMIN:-false});
        define('WP_AUTO_UPDATE_CORE', 'minor');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
    networks:
      - internal

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cad_edu_phpmyadmin
    restart: unless-stopped
    profiles: ["dev-tools"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
    ports:
      # Bound to loopback only — phpMyAdmin is a full DB-management UI and
      # must never be reachable from outside this machine, even in the
      # dev-tools profile (Phase 5 finding: was 0.0.0.0, network-reachable).
      - "127.0.0.1:${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  db_data:
  wp_data:
